services:
  redis:
    image: redis:7-alpine
    container_name: goal_keepr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goal_keepr_network

volumes:
  redis_data:
    driver: local

networks:
  goal_keepr_network:
    driver: bridge
