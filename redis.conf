# Redis 配置文件 - goal_keepr 专用
# 基于 redis:7-alpine

############################# 持久化 #############################

# RDB 快照持久化（适合备份、恢复，但可能丢失最近1分钟的写入）
save 900 1       # 900秒内至少有1个key变化则保存
save 300 10      # 300秒内至少有10个key变化则保存
save 60 10000    # 60秒内至少有10000个key变化则保存
dbfilename dump.rdb
dir /data

# AOF 追加持久化（更安全，推荐开启）
appendonly yes
appendfilename "appendonly.aof"
# 每次写入都记录到 AOF（最安全，性能有影响）
# appendfsync everysec  # 每秒同步（推荐，平衡性能与安全）
appendfsync always     # 每次写入都同步（最安全，IO性能要求高）

# AOF 重写配置
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# 混合持久化（RDB + AOF）
aof-use-rdb-preamble yes  # AOF 文件以 RDB 格式开头，恢复更快

############################# 内存管理 #############################

maxmemory 2gb
maxmemory-policy allkeys-lru  # 内存不足时按LRU淘汰所有key

############################# 网络 & 安全 #############################

bind 0.0.0.0
port 6379
protected-mode no  # Docker 内部网络，关闭保护模式
timeout 0
tcp-keepalive 300

# 密码（可选，如需要密码可在 docker-compose.yml 添加 environment）
# requirepass your_password

############################# 日志 #############################

loglevel notice
logfile ""

############################# 性能优化 #############################

# IO 线程（开启后读取操作可并行）
io-threads 4
io-threads-do-reads yes

# 管道缓冲
tcp-backlog 511

# 数据库数量
databases 16

always-show-logo no
